        // 获取主容器
        const container = document.querySelector('.grid');

        // 生成店铺卡片
        function renderShops() {
            shopData.forEach(shop => {
                // 创建卡片元素
                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg overflow-hidden card-shadow hover:shadow-lg transition-shadow duration-300';

                // 处理标签数据
                const tags = shop.tag.split(',').slice(0, 3); // 只显示前3个标签
                const tagHtml = tags.map(tag => `<span class="inline-block px-2 py-1 text-xs rounded-full tag-bg mr-1 mb-1">${tag}</span>`).join('');

                // 处理评分星星
                const rating = parseFloat(shop.biz_ext.rating);
                const fullStars = Math.floor(rating);
                const halfStar = rating % 1 >= 0.5 ? 1 : 0;
                const emptyStars = 5 - fullStars - halfStar;
                
                let starHtml = '';
                // 满星
                for(let i=0; i<fullStars; i++) {
                    starHtml += '<i class="fas fa-star text-yellow-400"></i>';
                }
                // 半星
                if(halfStar) {
                    starHtml += '<i class="fas fa-star-half-alt text-yellow-400"></i>';
                }
                // 空星
                for(let i=0; i<emptyStars; i++) {
                    starHtml += '<i class="far fa-star text-yellow-400"></i>';
                }

                // 处理行政区标签
                let districtClass = '';
                if (shop.adname === "云龙区") {
                    districtClass = "yunlong";
                } else if (shop.adname === "鼓楼区") {
                    districtClass = "gulou";
                } else if (shop.adname === "泉山区") {
                    districtClass = "quanshan";
                }
                let districtHtml = `<span class="district-tag ${districtClass}">${shop.adname}</span>`;

                // 处理多个电话号码的情况
                let telText = shop.tel;
                if (telText && telText.includes(';')) {
                    telText = telText.split(';').join(' / ');
                }

                // 新增：处理店铺类型（提取type字段最后一部分）
                const typeParts = shop.type.split(';');
                const shopType = typeParts[typeParts.length - 1] || '未知类型';
                const typeHtml = `<span class="type-tag">${shopType}</span>`;

                // 新增：处理店铺别名
                const aliasHtml = shop.alias && shop.alias.length > 0 
                    ? `<div class="flex items-center text-xs text-gray-500 mt-1">
                        <i class="fas fa-tag mr-1 text-blue-400"></i>
                        <span>别名：${shop.alias}</span>
                      </div>` 
                    : '';

                // 新增：处理数据更新时间
                const updateTime = shop.timestamp || '未知时间';
                
                // 新增：处理商圈信息
                const businessAreaHtml = shop.business_area && shop.business_area.length > 0
                    ? `<div class="flex items-center text-xs text-gray-500 mt-1">
                        <i class="fas fa-map mr-1 text-purple-400"></i>
                        <span>商圈：${shop.business_area}</span>
                      </div>`
                    : '';

                // 卡片内容
                card.innerHTML = `
                    <!-- 店铺图片 -->
                    <div class="h-48 overflow-hidden">
                        <img src="${shop.photos[0].url}" alt="${shop.name}" class="w-full h-full object-cover transition-transform duration-500 hover:scale-105">
                    </div>
                    <!-- 店铺信息 -->
                    <div class="p-4">
                        <div class="flex justify-between items-center mb-2">
                            <h2 class="text-lg font-semibold text-gray-800">${shop.name}</h2>
                            <div class="flex items-center gap-2">
                                ${districtHtml}
                                ${typeHtml}
                            </div>
                        </div>
                        
                        <!-- 评分和人均 -->
                        <div class="flex items-center mb-2">
                            <div class="flex mr-3">${starHtml}</div>
                            <span class="text-sm text-gray-600">${shop.biz_ext.rating}</span>
                            <span class="mx-2 text-gray-300">|</span>
                            <span class="text-sm text-gray-600">人均 ¥${shop.biz_ext.cost}</span>
                        </div>
                        
                        <!-- 标签 -->
                        <div class="mb-2">${tagHtml}</div>
                        
                        <!-- 地址 -->
                        <div class="flex items-center text-sm text-gray-500 mb-1">
                            <i class="fas fa-map-marker-alt mr-2 text-red-500"></i>
                            <span class="truncate">${shop.address}</span>
                        </div>
                        
                        <!-- 电话 -->
                        <div class="flex items-center text-sm text-gray-500 mb-1">
                            <i class="fas fa-phone-alt mr-2 text-green-500"></i>
                            <span>${telText || '暂无电话'}</span>
                        </div>
                        
                        <!-- 新增：别名、商圈信息 -->
                        ${aliasHtml}
                        ${businessAreaHtml}
                        
                        <!-- 新增：数据更新时间（底部小字） -->
                        <div class="flex items-center text-xs text-gray-400 mt-3 pt-2 border-t border-gray-100">
                            <i class="fas fa-history mr-1"></i>
                            <span>数据更新：${updateTime}</span>
                        </div>
                    </div>
                `;

                // 添加到容器
                container.appendChild(card);
            });
        }

        // 页面加载完成后渲染
        window.addEventListener('DOMContentLoaded', renderShops);
    </script>
