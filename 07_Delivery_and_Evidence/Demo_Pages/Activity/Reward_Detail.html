<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奖励明细 - 活动页</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    /* 基础重置与预览容器 */
    body {
      margin: 0;
      background-color: #e0e0e0;
      display: flex;
      justify-content: center;
      padding: 20px 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Segoe UI, Arial, sans-serif;
    }
    .mobile-container {
      width: 375px;
      min-height: 667px;
      background-color: #F5F7FA;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      border-radius: 30px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* 主题变量回归主页绿色体系 */
    :root {
      --primary-color: #9dc514;
      --primary-gradient: linear-gradient(135deg, #aadd11 0%, #9dc514 100%);
      --text-main: #333333;
      --text-sub: #999999;
      --bg-color: #F5F7FA;
    }

    /* 1) 顶部导航区 */
    .header-section {
      background: var(--primary-gradient);
      padding: 20px 15px 50px 15px;
      border-bottom-left-radius: 24px;
      border-bottom-right-radius: 24px;
      color: #fff;
    }
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 44px;
      margin-bottom: 10px;
    }
    .back-btn {
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
    }
    .page-title {
      font-size: 17px;
      font-weight: bold;
    }
    .help-btn {
      font-size: 13px;
      opacity: 0.9;
      cursor: pointer;
    }

    /* 2) 顶部汇总卡片 */
    .summary-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px 15px;
      margin: -40px 15px 15px 15px;
      box-shadow: 0 4px 12px rgba(157, 197, 20, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 10;
    }
    .summary-item {
      flex: 1;
      text-align: center;
      position: relative;
    }
    .summary-item:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 0;
      top: 20%;
      height: 60%;
      width: 1px;
      background: #eee;
    }
    .sum-value {
      font-size: 20px;
      font-weight: bold;
      color: var(--primary-color);
      display: block;
      margin-bottom: 4px;
    }
    .sum-value.dark { color: var(--text-main); }
    .sum-label {
      font-size: 12px;
      color: var(--text-sub);
    }

    /* 3) Tab 切换区 */
    .tabs-wrapper {
      background: var(--bg-color);
      position: sticky;
      top: 0;
      z-index: 9;
      padding: 0 15px;
    }
    .tabs-container {
      display: flex;
      justify-content: space-around;
      border-bottom: 1px solid #ebeef5;
    }
    .tab-item {
      padding: 12px 0;
      font-size: 14px;
      color: var(--text-sub);
      position: relative;
      cursor: pointer;
      transition: all 0.3s;
    }
    .tab-item.active {
      color: var(--text-main);
      font-weight: bold;
      font-size: 15px;
    }
    .tab-item.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 3px;
      background: var(--primary-color);
      border-radius: 2px;
    }

    /* 4) 列表内容区 */
    .list-container {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }
    .list-card {
      background: #fff;
      border-radius: 12px;
      padding: 0 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .list-item {
      padding: 16px 0;
      border-bottom: 1px solid #f5f5f5;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .list-item:last-child {
      border-bottom: none;
    }
    .item-left {
      display: flex;
      flex-direction: column;
    }
    .item-title {
      font-size: 15px;
      color: var(--text-main);
      margin-bottom: 6px;
      font-weight: 500;
    }
    .item-time {
      font-size: 12px;
      color: var(--text-sub);
    }
    .item-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    .item-amount {
      font-size: 18px;
      font-weight: bold;
      color: var(--text-main);
      margin-bottom: 6px;
    }
    .amount-highlight { color: var(--primary-color); }
    
    /* 状态标签 */
    .status-tag {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .status-success { color: #9dc514; background: #f0f7e6; }
    .status-pending { color: #ff9900; background: #fffbe6; }
    .status-failed { color: #999; background: #f5f5f5; }

    /* 邀请明细特殊样式 */
    .invite-step {
      font-size: 12px;
      color: #ff9900;
      background: #fffbe6;
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 4px;
      display: inline-block;
    }
    .invite-step.done {
      color: #9dc514; background: #f0f7e6;
    }

    /* === 各种状态 UI === */
    /* 空状态 */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 0;
      color: var(--text-sub);
    }
    .empty-icon {
      width: 120px;
      height: 120px;
      background: #f0f0f0;
      border-radius: 50%;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    .empty-text { font-size: 14px; margin-bottom: 20px; }
    .go-act-btn {
      background: var(--primary-color);
      color: #fff;
      border: none;
      padding: 8px 24px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
    }

    /* 骨架屏加载状态 */
    .skeleton-item {
      display: flex;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .ske-box {
      background: #f0f2f5;
      border-radius: 4px;
      animation: pulse 1.5s infinite ease-in-out;
    }
    .ske-title { width: 120px; height: 16px; margin-bottom: 8px; }
    .ske-time { width: 80px; height: 12px; }
    .ske-amount { width: 60px; height: 20px; margin-bottom: 8px; }
    .ske-status { width: 40px; height: 14px; }
    
    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    /* 错误状态 */
    .error-state {
      text-align: center;
      padding: 80px 0;
      color: var(--text-sub);
    }
    .retry-btn {
      margin-top: 15px;
      background: #fff;
      border: 1px solid var(--text-sub);
      color: var(--text-main);
      padding: 6px 20px;
      border-radius: 16px;
      cursor: pointer;
    }

    /* 模拟测试辅助按钮 */
    .mock-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      background: #fff;
      border-top: 1px solid #eee;
    }
    .mock-actions button {
      font-size: 11px; padding: 4px 8px; border: 1px solid #ccc; background: #fff; border-radius: 4px; color:#666; cursor: pointer;
    }

  </style>
</head>
<body>

  <div id="app" class="mobile-container">
    
    <!-- 1) 顶部导航区 -->
    <div class="header-section">
      <div class="nav-bar">
        <div class="back-btn">‹ 返回</div>
        <div class="page-title">奖励明细</div>
        <div class="help-btn">常见问题</div>
      </div>
    </div>

    <!-- 2) 顶部汇总卡片 -->
    <div class="summary-card">
      <div class="summary-item">
        <span class="sum-value">8,500</span>
        <span class="sum-label">当前金币</span>
      </div>
      <div class="summary-item">
        <span class="sum-value">3</span>
        <span class="sum-label">已邀人数</span>
      </div>
      <div class="summary-item">
        <span class="sum-value dark"><span style="font-size:14px">¥</span> 46.5</span>
        <span class="sum-label">累计红包</span>
      </div>
    </div>

    <!-- 3) Tab 切换区 -->
    <div class="tabs-wrapper">
      <div class="tabs-container">
        <div 
          class="tab-item" 
          v-for="(tab, index) in tabs" 
          :key="index"
          :class="{ active: currentTab === index }"
          @click="switchTab(index)">
          {{ tab }}
        </div>
      </div>
    </div>

    <!-- 4) 列表内容区 -->
    <div class="list-container">
      
      <!-- 状态 A：加载中 (骨架屏) -->
      <div class="list-card" v-if="pageStatus === 'loading'">
        <div class="skeleton-item" v-for="i in 5" :key="i">
          <div class="item-left">
            <div class="ske-box ske-title"></div>
            <div class="ske-box ske-time"></div>
          </div>
          <div class="item-right">
            <div class="ske-box ske-amount"></div>
            <div class="ske-box ske-status"></div>
          </div>
        </div>
      </div>

      <!-- 状态 B：网络错误 -->
      <div class="error-state" v-else-if="pageStatus === 'error'">
        <div style="font-size: 40px; margin-bottom: 10px;">📶</div>
        <div class="empty-text">网络好像开小差了，请检查网络设置</div>
        <button class="retry-btn" @click="mockLoadData">重新加载</button>
      </div>

      <!-- 状态 C：空状态 -->
      <div class="empty-state" v-else-if="pageStatus === 'empty' || currentListData.length === 0">
        <div class="empty-icon">📭</div>
        <div class="empty-text">暂无{{ tabs[currentTab] }}记录</div>
        <button class="go-act-btn">去参与活动</button>
      </div>

      <!-- 状态 D：正常有数据状态 -->
      <div class="list-card" v-else>
        
        <!-- Tab 0: 红包明细 -->
        <template v-if="currentTab === 0">
          <div class="list-item" v-for="(item, index) in currentListData" :key="'rp'+index">
            <div class="item-left">
              <span class="item-title">{{ item.name }}</span>
              <span class="item-time">{{ item.time }} | {{ item.source }}</span>
            </div>
            <div class="item-right">
              <span class="item-amount amount-highlight">+{{ item.amount }}元</span>
              <span class="status-tag" :class="getPacketStatusClass(item.statusCode)">
                {{ item.statusText }}
              </span>
            </div>
          </div>
        </template>

        <!-- Tab 1: 邀请明细 -->
        <template v-if="currentTab === 1">
          <div class="list-item" v-for="(item, index) in currentListData" :key="'inv'+index">
            <div class="item-left">
              <span class="item-title">邀请好友 {{ item.user }}</span>
              <span class="item-time" style="margin-bottom: 4px;">{{ item.time }}</span>
              <div>
                <span class="invite-step" :class="{ done: item.statusCode === 'rewarded' }">
                  {{ item.stepText }}
                </span>
              </div>
            </div>
            <div class="item-right" style="justify-content: center;">
              <span class="item-amount" :class="{ 'amount-highlight': item.statusCode === 'rewarded' }">
                {{ item.amount ? '+'+item.amount+'元' : '--' }}
              </span>
            </div>
          </div>
        </template>

        <!-- Tab 2: 金币明细 -->
        <template v-if="currentTab === 2">
          <div class="list-item" v-for="(item, index) in currentListData" :key="'coin'+index">
            <div class="item-left">
              <span class="item-title">{{ item.name }}</span>
              <span class="item-time">{{ item.time }}</span>
            </div>
            <div class="item-right" style="justify-content: center;">
              <span class="item-amount amount-highlight" style="margin-bottom: 0;">{{ item.amount }}</span>
            </div>
          </div>
        </template>

      </div>
    </div>

    <!-- 仅供预览体验状态的控制面板（正式环境删除） -->
    <div class="mock-actions">
      <button @click="setMockStatus('loading')">模拟加载中</button>
      <button @click="setMockStatus('normal')">模拟正常数据</button>
      <button @click="setMockStatus('empty')">模拟空数据</button>
      <button @click="setMockStatus('error')">模拟网络异常</button>
    </div>

  </div>

  <script>
    const { createApp, ref, computed, onMounted } = Vue;

    createApp({
      setup() {
        const tabs = ['红包明细', '邀请明细', '金币明细'];
        
        // 模拟路由传参：如果从“我的金币”进入则默认 2，从“查看明细”进入默认 0
        // 这里默认选中红包明细
        const currentTab = ref(0);
        
        // 页面状态机: loading | normal | empty | error
        const pageStatus = ref('loading');

        // 模拟各 Tab 数据库
        const mockDataStore = {
          0: [ // 红包
            { name: '限时活动补贴', amount: '15.00', statusCode: 'pending', statusText: '审核中', time: '2026-03-26 10:30', source: '周末狂欢档' },
            { name: '邀请奖励', amount: '30.00', statusCode: 'success', statusText: '发放成功', time: '2026-03-25 18:20', source: '邀新赚钱' },
            { name: '新人红包', amount: '1.50', statusCode: 'success', statusText: '发放成功', time: '2026-03-24 09:15', source: '新人专属' },
            { name: '签到红包', amount: '0.88', statusCode: 'failed', statusText: '发放失败', time: '2026-03-20 08:00', source: '连续签到' }
          ],
          1: [ // 邀请
            { user: '用户***3321', amount: '30.00', statusCode: 'pending', stepText: '好友待完成任务', time: '2026-03-26 09:00' },
            { user: '用户***8901', amount: '15.00', statusCode: 'rewarded', stepText: '奖励已发放', time: '2026-03-24 14:30' },
            { user: '用户***4455', amount: null, statusCode: 'registered', stepText: '好友已注册', time: '2026-03-23 11:20' },
            { user: '用户***1122', amount: null, statusCode: 'invalid', stepText: '任务已过期', time: '2026-03-10 10:00' }
          ],
          2: [ // 金币
            { name: '每日签到', amount: '+10', time: '2026-03-26 08:00' },
            { name: '浏览优质食谱30秒', amount: '+50', time: '2026-03-25 20:30' },
            { name: '分享一道菜谱给好友', amount: '+100', time: '2026-03-25 12:15' },
            { name: '每日签到', amount: '+10', time: '2026-03-24 08:00' }
          ]
        };

        const currentListData = computed(() => {
          return mockDataStore[currentTab.value] || [];
        });

        const switchTab = (index) => {
          if (currentTab.value === index) return;
          currentTab.value = index;
          // 切换 Tab 时模拟轻量级加载体验
          pageStatus.value = 'loading';
          setTimeout(() => {
            pageStatus.value = 'normal';
          }, 400);
        };

        // 样式辅助函数
        const getPacketStatusClass = (code) => {
          const map = {
            'success': 'status-success',
            'pending': 'status-pending',
            'failed': 'status-failed'
          };
          return map[code] || 'status-failed';
        };

        // 模拟数据加载
        const mockLoadData = () => {
          pageStatus.value = 'loading';
          setTimeout(() => {
            pageStatus.value = 'normal';
          }, 800);
        };

        const setMockStatus = (status) => {
          pageStatus.value = status;
        };

        onMounted(() => {
          mockLoadData();
        });

        return {
          tabs,
          currentTab,
          pageStatus,
          currentListData,
          switchTab,
          getPacketStatusClass,
          mockLoadData,
          setMockStatus
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
