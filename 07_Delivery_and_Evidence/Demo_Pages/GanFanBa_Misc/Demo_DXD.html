<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUR LOVE LOG | 恋爱手账</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 字体：ZCOOL XiaoWei (优雅中文), Dancing Script (手写英文) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    
    <!-- GSAP & Draggable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>

    <style>
        :root {
            --bg-color: #fdfbf7;
            --accent-pink: #ffb7b2;
            --accent-red: #ff6f61;
            --text-color: #4a4a4a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'ZCOOL XiaoWei', serif;
            overflow-x: hidden;
            background-image: radial-gradient(#ffdede 1px, transparent 1px);
            background-size: 40px 40px; /* 波点纸纹理 */
        }

        .font-hand {
            font-family: 'Dancing Script', cursive;
        }

        /* 拍立得照片样式 */
        .polaroid {
            background: white;
            padding: 1rem 1rem 3rem 1rem;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            transform: rotate(var(--rotation));
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: grab;
            position: absolute;
            will-change: transform;
        }
        .polaroid:active {
            cursor: grabbing;
            transform: scale(1.05) rotate(var(--rotation));
            box-shadow: 10px 10px 25px rgba(0,0,0,0.15);
            z-index: 50;
        }

        /* 红线 SVG 容器 */
        .string-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: visible;
        }

        /* 樱花粒子 */
        .petal {
            position: fixed;
            background: #ffc3c3;
            border-radius: 100% 0 100% 0;
            opacity: 0.8;
            pointer-events: none;
            z-index: 999;
        }

        /* 心跳按钮 */
        .heart-btn {
            animation: heartbeat 1.5s infinite;
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); }
            70% { transform: scale(1); }
        }

        /* 纸飞机动画类 */
        .paper-plane-fly {
            animation: flyAway 1.5s ease-in forwards;
        }
        @keyframes flyAway {
            0% { transform: translate(0, 0) rotate(0); opacity: 1; }
            100% { transform: translate(500px, -500px) rotate(45deg); opacity: 0; }
        }
    </style>
</head>
<body class="relative">

    <!-- 顶部导航 -->
    <nav class="fixed top-0 w-full p-6 flex justify-between items-center z-50 mix-blend-multiply">
        <div class="text-2xl font-bold text-[var(--accent-red)]">Love.Log</div>
        <div class="bg-white/50 backdrop-blur-sm px-4 py-2 rounded-full border border-[var(--accent-pink)]">
            <span class="text-xs tracking-widest text-[var(--text-color)]">DAY 365 OF LOVING YOU</span>
        </div>
    </nav>

    <!-- 贯穿全页的红线 SVG -->
    <div class="string-container h-[300vh]">
        <svg width="100%" height="100%" preserveAspectRatio="none">
            <path id="red-string" d="" fill="none" stroke="#ff6f61" stroke-width="3" stroke-dasharray="10 5" stroke-linecap="round" />
        </svg>
    </div>

    <!-- Hero Section -->
    <header class="h-screen w-full flex flex-col justify-center items-center relative z-10 text-center px-4">
        <div class="mb-4 text-[var(--accent-red)] font-hand text-4xl md:text-6xl animate-pulse">Our Sweet Journey</div>
        <h1 class="text-5xl md:text-7xl mb-8 leading-tight">
            遇见你，是银河<br>赠予我的糖
        </h1>
        <p class="text-gray-500 max-w-md mx-auto mb-12">
            向下滚动，翻阅我们收集的细碎美好。
            <br>每一张照片，都是时光的标本。
        </p>
        
        <!-- 互动按钮 -->
        <button id="bloom-btn" class="heart-btn bg-[var(--accent-red)] text-white w-16 h-16 rounded-full flex items-center justify-center shadow-lg hover:shadow-xl transition-shadow cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd" />
            </svg>
        </button>
        <span class="text-xs text-[var(--accent-pink)] mt-2">点击释放爱意</span>
    </header>

    <!-- 互动回忆区 (Draggable Area) -->
    <section class="min-h-screen w-full relative z-10 overflow-hidden" id="memory-lane">
        <div class="absolute top-10 left-10 md:left-20">
            <h2 class="text-3xl md:text-4xl text-[var(--text-color)]">回忆碎片</h2>
            <p class="text-sm text-gray-400 mt-2">拖拽照片，整理我们的桌子</p>
        </div>

        <!-- 照片容器 (绝对定位) -->
        <div class="relative w-full h-[80vh] mt-20" id="photo-container">
            <!-- Photo 1 -->
            <div class="polaroid w-48 md:w-64 top-[10%] left-[10%]" style="--rotation: -5deg;">
                <img src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?q=80&w=600&auto=format&fit=crop" class="w-full h-48 object-cover filter sepia-[.3]" alt="Love">
                <div class="text-center mt-3 font-hand text-xl text-gray-600">First Date</div>
            </div>

            <!-- Photo 2 -->
            <div class="polaroid w-48 md:w-64 top-[30%] right-[15%]" style="--rotation: 8deg;">
                <img src="https://images.unsplash.com/photo-1529634806980-85c3dd6d34ac?q=80&w=600&auto=format&fit=crop" class="w-full h-48 object-cover filter sepia-[.3]" alt="Love">
                <div class="text-center mt-3 font-hand text-xl text-gray-600">Holding Hands</div>
            </div>

            <!-- Photo 3 -->
            <div class="polaroid w-48 md:w-64 top-[50%] left-[20%]" style="--rotation: -12deg;">
                <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=600&auto=format&fit=crop" class="w-full h-48 object-cover filter sepia-[.3]" alt="Love">
                <div class="text-center mt-3 font-hand text-xl text-gray-600">Silly Moments</div>
            </div>
            
            <!-- Sticker/Note -->
            <div class="polaroid w-40 bg-[var(--accent-pink)] text-white p-4 top-[15%] left-[50%]" style="--rotation: 3deg;">
                <p class="font-hand text-lg leading-relaxed">"You are my favorite notification."</p>
            </div>
        </div>
    </section>

    <!-- 承诺与纸飞机 -->
    <section class="h-screen w-full flex flex-col justify-center items-center relative z-10 bg-white/50 backdrop-blur-sm">
        <h2 class="text-3xl md:text-5xl mb-10 text-center">写给未来的我们</h2>
        
        <div class="w-full max-w-lg px-6 relative" id="message-box">
            <div class="bg-white p-8 rounded-2xl shadow-xl border-2 border-[var(--bg-color)]">
                <textarea class="w-full h-32 bg-gray-50 rounded-lg p-4 focus:outline-none focus:ring-2 focus:ring-[var(--accent-pink)] resize-none text-[var(--text-color)]" placeholder="在这里写下你的愿望..."></textarea>
                <div class="flex justify-between items-center mt-4">
                    <span class="text-xs text-gray-400">By: Me</span>
                    <button onclick="sendLove()" class="bg-[var(--accent-red)] text-white px-6 py-2 rounded-full hover:bg-red-500 transition-colors flex items-center gap-2">
                        <span>发送</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- 成功提示 -->
            <div id="sent-msg" class="absolute top-0 left-0 w-full h-full flex justify-center items-center opacity-0 pointer-events-none transition-opacity duration-500">
                <span class="text-2xl text-[var(--accent-red)] font-bold">已寄出 ❤️</span>
            </div>
        </div>
    </section>

    <script>
        gsap.registerPlugin(ScrollTrigger, Draggable);

        // ----------------------------------------------------
        // 1. 红线绘制逻辑 (Red String of Fate)
        // ----------------------------------------------------
        function drawRedString() {
            const path = document.getElementById('red-string');
            const height = document.body.scrollHeight;
            const width = window.innerWidth;
            
            // 生成一条蜿蜒的路径
            // 简单的贝塞尔曲线模拟红线
            const d = `
                M ${width/2} 0 
                C ${width/2} ${height*0.1}, ${width*0.2} ${height*0.2}, ${width*0.3} ${height*0.3}
                S ${width*0.8} ${height*0.5}, ${width/2} ${height*0.7}
                S ${width*0.2} ${height*0.9}, ${width/2} ${height}
            `;
            
            path.setAttribute('d', d);
            
            // 获取路径长度
            const length = path.getTotalLength();
            
            // 设置虚线动画
            path.style.strokeDasharray = length;
            path.style.strokeDashoffset = length;

            // 滚动触发绘制
            gsap.to(path, {
                strokeDashoffset: 0,
                ease: "none",
                scrollTrigger: {
                    trigger: "body",
                    start: "top top",
                    end: "bottom bottom",
                    scrub: 1
                }
            });
        }
        
        // 初始化并在调整大小时重绘
        drawRedString();
        window.addEventListener('resize', drawRedString);


        // ----------------------------------------------------
        // 2. 照片拖拽逻辑 (Draggable Memories)
        // ----------------------------------------------------
        Draggable.create(".polaroid", {
            type: "x,y",
            edgeResistance: 0.65,
            bounds: "#memory-lane",
            inertia: true,
            onDragStart: function() {
                gsap.to(this.target, { scale: 1.1, zIndex: 100, duration: 0.2 });
            },
            onDragEnd: function() {
                gsap.to(this.target, { scale: 1, zIndex: 50, duration: 0.2 });
            }
        });

        // 初始动画：照片散落效果
        gsap.from(".polaroid", {
            y: 100,
            opacity: 0,
            rotate: 0,
            duration: 1.5,
            stagger: 0.2,
            ease: "back.out(1.7)",
            scrollTrigger: {
                trigger: "#memory-lane",
                start: "top 70%"
            }
        });


        // ----------------------------------------------------
        // 3. 樱花/爱心爆炸效果 (Particle Bloom)
        // ----------------------------------------------------
        const bloomBtn = document.getElementById('bloom-btn');
        
        bloomBtn.addEventListener('click', (e) => {
            // 创造 30 个爱心粒子
            for(let i=0; i<30; i++) {
                createParticle(e.clientX, e.clientY);
            }
            
            // 按钮点击反馈
            gsap.fromTo(bloomBtn, {scale: 0.8}, {scale: 1, duration: 0.3, ease: "elastic.out(1, 0.3)"});
        });

        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.classList.add('petal');
            document.body.appendChild(particle);

            // 随机大小、颜色和方向
            const size = Math.random() * 20 + 10;
            const color = Math.random() > 0.5 ? '#ff6f61' : '#ffb7b2';
            
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.backgroundColor = color;
            particle.style.left = `${x}px`;
            particle.style.top = `${y}px`;
            
            // 使用剪贴路径做成心形
            particle.style.clipPath = "path('M10,30 A20,20,0,0,1,50,30 A20,20,0,0,1,90,30 Q90,60,50,90 Q10,60,10,30 Z')";
            // 修正心形大小适配 div
            particle.style.transform = "scale(0.2)"; 

            // 爆炸动画
            const destinationX = x + (Math.random() - 0.5) * 400;
            const destinationY = y + (Math.random() - 0.5) * 400;
            const rotation = Math.random() * 360;

            gsap.to(particle, {
                x: destinationX - x,
                y: destinationY - y,
                rotation: rotation,
                opacity: 0,
                duration: 1 + Math.random(),
                ease: "power2.out",
                onComplete: () => {
                    particle.remove();
                }
            });
        }

        // ----------------------------------------------------
        // 4. 纸飞机发送动画
        // ----------------------------------------------------
        window.sendLove = function() {
            const box = document.querySelector('#message-box > div'); // 获取输入框容器
            const successMsg = document.getElementById('sent-msg');
            
            // 1. 盒子变成飞机的变形动画 (视觉欺骗，直接飞走)
            box.classList.add('paper-plane-fly');
            
            // 2. 显示成功文字
            setTimeout(() => {
                successMsg.style.opacity = 1;
                gsap.from(successMsg, {scale: 0.5, ease: "elastic.out(1, 0.3)"});
            }, 500);

            // 3. 重置状态 (可选)
            setTimeout(() => {
                box.classList.remove('paper-plane-fly');
                box.querySelector('textarea').value = ""; // 清空
                // 简单的淡入回来
                gsap.fromTo(box, {opacity: 0, x:0, y:0, rotation: 0}, {opacity: 1, duration: 0.5});
                successMsg.style.opacity = 0;
            }, 3000);
        }

    </script>
</body>
</html>
