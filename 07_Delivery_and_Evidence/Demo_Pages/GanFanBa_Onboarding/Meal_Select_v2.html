<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷启动优化 - 瀑布流选菜</title>
    <style>
        :root {
            --primary: #8CC63F;
            --text-main: #333333;
            --text-sub: #999999;
            --bg: #F9F9F9;
        }

        body {
            background-color: #7f7f7f;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }

        .modal-card {
            width: 340px; height: 620px; /* 加高一点展示更多 */
            background: #fff; border-radius: 20px;
            display: flex; flex-direction: column;
            overflow: hidden; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        /* 头部 */
        .header {
            padding: 20px 20px 10px; flex-shrink: 0;
            background: #fff; z-index: 10;
        }
        .title-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px;
        }
        .title { font-size: 18px; font-weight: bold; color: var(--text-main); }
        .counter { 
            font-size: 12px; font-weight: bold; color: var(--text-sub);
            background: #F5F5F5; padding: 4px 10px; border-radius: 12px;
        }
        .counter.active { color: var(--primary); background: rgba(140,198,63,0.1); }

        /* 顶部筛选栏 (横向滚动) */
        .filter-bar {
            display: flex; gap: 8px; overflow-x: auto; 
            padding-bottom: 8px; scrollbar-width: none;
        }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-chip {
            padding: 6px 14px; background: #F5F7FA; color: #666;
            border-radius: 16px; font-size: 12px; white-space: nowrap;
            transition: all 0.2s; border: 1px solid transparent; cursor: pointer;
        }
        .filter-chip.active {
            background: var(--primary); color: #fff; font-weight: bold;
            box-shadow: 0 2px 6px rgba(140, 198, 63, 0.3);
        }

        /* --- 核心：瀑布流容器 --- */
        .masonry-container {
            flex: 1; overflow-y: auto; padding: 10px 15px 80px 15px; /* 底部留白给按钮 */
            column-count: 2; /* CSS多列布局实现瀑布流 */
            column-gap: 12px;
        }

        .dish-item {
            break-inside: avoid; /* 防止卡片被切断 */
            margin-bottom: 12px;
            border-radius: 12px; overflow: hidden;
            position: relative; cursor: pointer;
            transform: translateZ(0); /* 硬件加速 */
        }

        .dish-img {
            width: 100%; display: block;
            object-fit: cover;
        }

        /* 渐变遮罩 (增强文字可读性) */
        .gradient-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60px;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            pointer-events: none;
        }

        .dish-name {
            position: absolute; bottom: 8px; left: 8px;
            color: #fff; font-size: 13px; font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            width: 90%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* --- 选中态 --- */
        .select-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); /* 选中变暗 */
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.2s;
        }
        .check-icon {
            width: 28px; height: 28px; background: var(--primary);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 16px; transform: scale(0); transition: transform 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .dish-item.active .select-layer { opacity: 1; }
        .dish-item.active .check-icon { transform: scale(1); }

        /* 底部浮动按钮 */
        .footer-float {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 20px; background: linear-gradient(to top, #fff 80%, transparent);
            box-sizing: border-box; display: flex; justify-content: center;
        }
        .btn-next {
            width: 100%; height: 44px; background: #E0E0E0; 
            color: #999; border: none; border-radius: 22px;
            font-size: 16px; font-weight: bold; cursor: not-allowed;
            transition: all 0.3s;
        }
        .btn-next.ready {
            background: var(--primary); color: #fff; cursor: pointer;
            box-shadow: 0 4px 15px rgba(140, 198, 63, 0.4);
        }

    </style>
</head>
<body>

    <div class="modal-card">
        <div class="header">
            <div class="title-row">
                <span class="title">选出你的心动美食</span>
                <span class="counter" id="counter">0/5</span>
            </div>
            <div class="filter-bar">
                <div class="filter-chip active">猜你喜欢</div>
                <div class="filter-chip">重口味</div>
                <div class="filter-chip">减脂轻食</div>
                <div class="filter-chip">甜食控</div>
                <div class="filter-chip">面食</div>
            </div>
        </div>

        <div class="masonry-container">
            <div class="dish-item" onclick="toggle(this)">
                <img src="https://images.unsplash.com/photo-1555126634-323283e090fa?auto=format&fit=crop&w=300&q=80" class="dish-img" style="height: 180px;">
                <div class="gradient-overlay"></div>
                <div class="dish-name">麻婆豆腐</div>
                <div class="select-layer"><div class="check-icon">✓</div></div>
            </div>

            <div class="dish-item" onclick="toggle(this)">
                <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=300&q=80" class="dish-img" style="height: 120px;">
                <div class="gradient-overlay"></div>
                <div class="dish-name">轻食沙拉</div>
                <div class="select-layer"><div class="check-icon">✓</div></div>
            </div>

            <div class="dish-item" onclick="toggle(this)">
                <img src="https://images.unsplash.com/photo-1565557623262-b51c2513a641?auto=format&fit=crop&w=300&q=80" class="dish-img" style="height: 150px;">
                <div class="gradient-overlay"></div>
                <div class="dish-name">清蒸鲈鱼</div>
                <div class="select-layer"><div class="check-icon">✓</div></div>
            </div>

            <div class="dish-item" onclick="toggle(this)">
                <img src="https://images.unsplash.com/photo-1623653387945-2fd25214f8fc?auto=format&fit=crop&w=300&q=80" class="dish-img" style="height: 200px;">
                <div class="gradient-overlay"></div>
                <div class="dish-name">广式叉烧</div>
                <div class="select-layer"><div class="check-icon">✓</div></div>
            </div>

            <div class="dish-item" onclick="toggle(this)">
                <img src="https://images.unsplash.com/photo-1512058564366-18510be2db19?auto=format&fit=crop&w=300&q=80" class="dish-img" style="height: 130px;">
                <div class="gradient-overlay"></div>
                <div class="dish-name">麻辣香锅</div>
                <div class="select-layer"><div class="check-icon">✓</div></div>
            </div>

             <div class="dish-item" onclick="toggle(this)">
                <img src="https://images.unsplash.com/photo-1563379926898-05f4575a45d8?auto=format&fit=crop&w=300&q=80" class="dish-img" style="height: 160px;">
                <div class="gradient-overlay"></div>
                <div class="dish-name">海鲜意面</div>
                <div class="select-layer"><div class="check-icon">✓</div></div>
            </div>
             <div class="dish-item" onclick="toggle(this)">
                <img src="https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?auto=format&fit=crop&w=300&q=80" class="dish-img" style="height: 140px;">
                <div class="gradient-overlay"></div>
                <div class="dish-name">牛肉汉堡</div>
                <div class="select-layer"><div class="check-icon">✓</div></div>
            </div>
        </div>

        <div class="footer-float">
            <button class="btn-next" id="btnNext">选好了 (0/5)</button>
        </div>
    </div>

    <script>
        let count = 0;
        const max = 5;

        // 简单的标签切换逻辑
        const chips = document.querySelectorAll('.filter-chip');
        chips.forEach(chip => {
            chip.onclick = function() {
                chips.forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                // 实际开发中这里会触发 AJAX 请求刷新瀑布流数据
                // 模拟刷新动画
                const container = document.querySelector('.masonry-container');
                container.style.opacity = '0.5';
                setTimeout(() => container.style.opacity = '1', 200);
            }
        });

        function toggle(el) {
            if (el.classList.contains('active')) {
                el.classList.remove('active');
                count--;
            } else {
                if (count >= max) {
                    alert('最多选5个，不要太贪心哦~');
                    return;
                }
                el.classList.add('active');
                count++;
            }
            updateUI();
        }

        function updateUI() {
            const counter = document.getElementById('counter');
            const btn = document.getElementById('btnNext');
            
            counter.innerText = `${count}/${max}`;
            btn.innerText = count > 0 ? `选好了 (${count}/${max})` : `选好了 (0/5)`;
            
            if (count > 0) {
                counter.classList.add('active');
                btn.classList.add('ready');
                btn.onclick = () => alert("画像生成中...");
            } else {
                counter.classList.remove('active');
                btn.classList.remove('ready');
                btn.onclick = null;
            }
        }
    </script>
</body>
</html>
